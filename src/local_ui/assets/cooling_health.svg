<?xml version="1.0" encoding="UTF-8"?>
<!--
  CDU Cooling Health Diagram
  No label column — full width used for Loop 1 / Loop 2
  Pipe lines connect box edges (bottom→top of next box)
  Left stripe on each box = flow stage indicator (integrated, not separate)
  Value placeholders : {KEY}
  Color placeholders : {KEY_C}
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 358"
     font-family="Arial,Helvetica,sans-serif" font-size="11">

  <!-- ── BACKGROUND ──────────────────────────────────────────────────── -->
  <rect width="560" height="358" fill="white"/>

  <!-- ── COLUMN HEADERS (y=0–20) ─────────────────────────────────────── -->
  <rect x="10"  y="0" width="256" height="20" fill="#ecf0f1"/>
  <rect x="294" y="0" width="256" height="20" fill="#ecf0f1"/>
  <text x="138" y="14" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Loop 1</text>
  <text x="422" y="14" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Loop 2</text>
  <line x1="0" y1="20" x2="560" y2="20" stroke="#b0bec5" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════════════════════
       BOXES (drawn first; pipe stripes drawn on top after)
       ════════════════════════════════════════════════════════════════ -->

  <!-- ── RESERVOIR (y=20–72, spans both columns) ─────────────────────── -->
  <rect x="10" y="24" width="540" height="44" rx="5" fill="#f0f4ff" stroke="#90caf9" stroke-width="1.5"/>
  <text x="280" y="37" text-anchor="middle" fill="#546e7a" font-size="9">Reservoir</text>
  <text x="130" y="56" text-anchor="middle" fill="#546e7a" font-size="10">Level: <tspan fill="{WATER_LEVEL_C}" font-weight="bold">{WATER_LEVEL}</tspan></text>
  <text x="280" y="56" text-anchor="middle" fill="#546e7a" font-size="10">pH: <tspan fill="#546e7a" font-weight="bold">{PH}</tspan></text>
  <text x="430" y="56" text-anchor="middle" fill="#546e7a" font-size="10">Cond: <tspan fill="#546e7a" font-weight="bold">{CONDUCTIVITY}</tspan><tspan dx="2" fill="#78909c" font-size="9">μS</tspan></text>

  <!-- ── PUMP ROW (y=86–124) ─────────────────────────────────────────── -->
  <!-- L1 -->
  <rect x="10" y="86" width="256" height="34" rx="4" fill="white" stroke="#dde1e7" stroke-width="1"/>
  <text x="143" y="99" text-anchor="middle" fill="#78909c" font-size="9">Pump</text>
  <text x="143" y="115" text-anchor="middle" fill="#e65100" font-size="15" font-weight="bold">{PUMP_DUTY_1}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">%</tspan></text>
  <!-- L2 -->
  <rect x="294" y="86" width="256" height="34" rx="4" fill="white" stroke="#dde1e7" stroke-width="1"/>
  <text x="422" y="99" text-anchor="middle" fill="#78909c" font-size="9">Pump</text>
  <text x="422" y="115" text-anchor="middle" fill="#e65100" font-size="15" font-weight="bold">{PUMP_DUTY_2}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">%</tspan></text>

  <!-- ── FLOW ROW (y=136–158, no box) ────────────────────────────────── -->
  <text x="143" y="151" text-anchor="middle" fill="#1565c0" font-size="15" font-weight="bold">{FLOW_1}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">L/min</tspan></text>
  <text x="422" y="151" text-anchor="middle" fill="#1565c0" font-size="15" font-weight="bold">{FLOW_2}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">L/min</tspan></text>
  <text x="78" y="151" text-anchor="middle" fill="#90a4ae" font-size="8">Flow</text>
  <text x="362" y="151" text-anchor="middle" fill="#90a4ae" font-size="8">Flow</text>

  <!-- ── INLET ROW (y=164–196) ───────────────────────────────────────── -->
  <!-- L1 -->
  <rect x="10" y="164" width="256" height="32" rx="4" fill="#fff8f8" stroke="#dde1e7" stroke-width="1"/>
  <text x="143" y="176" text-anchor="middle" fill="#78909c" font-size="9">Inlet Manifold</text>
  <text x="143" y="192" text-anchor="middle" fill="{INLET_1_C}" font-size="15" font-weight="bold">{INLET_1}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">°C</tspan></text>
  <!-- L2 -->
  <rect x="294" y="164" width="256" height="32" rx="4" fill="#fff8f8" stroke="#dde1e7" stroke-width="1"/>
  <text x="422" y="176" text-anchor="middle" fill="#78909c" font-size="9">Inlet Manifold</text>
  <text x="422" y="192" text-anchor="middle" fill="{INLET_2_C}" font-size="15" font-weight="bold">{INLET_2}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">°C</tspan></text>

  <!-- ── SERVER ROW (y=210–252) ──────────────────────────────────────── -->
  <!-- L1 -->
  <rect x="10" y="210" width="256" height="36" rx="4" fill="white" stroke="#dde1e7" stroke-width="1"/>
  <text x="143" y="224" text-anchor="middle" fill="#78909c" font-size="9">Server 1</text>
  <text x="143" y="242" text-anchor="middle" fill="#b0bec5" font-size="10">(heat source)</text>
  <!-- L2 -->
  <rect x="294" y="210" width="256" height="36" rx="4" fill="white" stroke="#dde1e7" stroke-width="1"/>
  <text x="422" y="224" text-anchor="middle" fill="#78909c" font-size="9">Server 2</text>
  <text x="422" y="242" text-anchor="middle" fill="#b0bec5" font-size="10">(heat source)</text>

  <!-- ── OUTLET ROW (y=266–298) ──────────────────────────────────────── -->
  <!-- L1 -->
  <rect x="10" y="266" width="256" height="32" rx="4" fill="#fff8f8" stroke="#dde1e7" stroke-width="1"/>
  <text x="143" y="278" text-anchor="middle" fill="#78909c" font-size="9">Outlet Manifold</text>
  <text x="143" y="294" text-anchor="middle" fill="{OUTLET_1_C}" font-size="15" font-weight="bold">{OUTLET_1}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">°C</tspan></text>
  <!-- L2 -->
  <rect x="294" y="266" width="256" height="32" rx="4" fill="#fff8f8" stroke="#dde1e7" stroke-width="1"/>
  <text x="422" y="278" text-anchor="middle" fill="#78909c" font-size="9">Outlet Manifold</text>
  <text x="422" y="294" text-anchor="middle" fill="{OUTLET_2_C}" font-size="15" font-weight="bold">{OUTLET_2}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">°C</tspan></text>

  <!-- ── FAN ROW (y=312–340) ─────────────────────────────────────────── -->
  <!-- L1 -->
  <rect x="10" y="312" width="256" height="28" rx="4" fill="white" stroke="#dde1e7" stroke-width="1"/>
  <text x="143" y="323" text-anchor="middle" fill="#78909c" font-size="9">Fan</text>
  <text x="143" y="337" text-anchor="middle" fill="#00897b" font-size="15" font-weight="bold">{FAN_DUTY_1}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">%</tspan></text>
  <!-- L2 -->
  <rect x="294" y="312" width="256" height="28" rx="4" fill="white" stroke="#dde1e7" stroke-width="1"/>
  <text x="422" y="323" text-anchor="middle" fill="#78909c" font-size="9">Fan</text>
  <text x="422" y="337" text-anchor="middle" fill="#00897b" font-size="15" font-weight="bold">{FAN_DUTY_2}<tspan dx="3" fill="#90a4ae" font-size="10" font-weight="normal">%</tspan></text>

  <!-- ════════════════════════════════════════════════════════════════
       FLOW PIPES — drawn on top of boxes
       Left stripe inside each box + connecting segments between boxes
       L1 stripe/pipe at x=22  |  L2 stripe/pipe at x=306
       ════════════════════════════════════════════════════════════════ -->

  <!-- ── BLUE stripe: Reservoir→Inlet (cool water) ────────────────────
       Stripe inside boxes: pump (y=86-124), inlet (y=164-196)
       Connecting segments between boxes: reservoir→pump, pump→flow, flow→inlet -->

  <!-- Reservoir bottom T-junction -->
  <line x1="22"  y1="68"  x2="306" y2="68"  stroke="#42a5f5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22"  y1="68"  x2="22"  y2="86"  stroke="#42a5f5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="306" y1="68"  x2="306" y2="86"  stroke="#42a5f5" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blue stripe inside Pump boxes -->
  <rect x="10" y="86" width="6" height="34" rx="0" fill="#42a5f5"/>
  <rect x="294" y="86" width="6" height="34" rx="0" fill="#42a5f5"/>

  <!-- Blue connectors: Pump→Flow area (y=120-164) -->
  <line x1="22"  y1="120" x2="22"  y2="164" stroke="#42a5f5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="306" y1="120" x2="306" y2="164" stroke="#42a5f5" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Flow value sits at y≈151 — add small circle indicator on pipe -->
  <circle cx="22"  cy="147" r="4" fill="white" stroke="#42a5f5" stroke-width="2"/>
  <circle cx="306" cy="147" r="4" fill="white" stroke="#42a5f5" stroke-width="2"/>

  <!-- Blue stripe inside Inlet boxes -->
  <rect x="10" y="164" width="6" height="32" rx="0" fill="#42a5f5"/>
  <rect x="294" y="164" width="6" height="32" rx="0" fill="#42a5f5"/>

  <!-- ── RED stripe: Inlet→Outlet (hot water) ─────────────────────────
       Connecting: inlet→server, stripe inside server, server→outlet -->

  <!-- Red connectors: Inlet bottom → Server top (y=196-210) -->
  <line x1="22"  y1="196" x2="22"  y2="210" stroke="#ef5350" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="306" y1="196" x2="306" y2="210" stroke="#ef5350" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Red stripe inside Server boxes -->
  <rect x="10" y="210" width="6" height="36" rx="0" fill="#ef5350"/>
  <rect x="294" y="210" width="6" height="36" rx="0" fill="#ef5350"/>

  <!-- Red connectors: Server bottom → Outlet top (y=246-266) -->
  <line x1="22"  y1="246" x2="22"  y2="266" stroke="#ef5350" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="306" y1="246" x2="306" y2="266" stroke="#ef5350" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Red stripe inside Outlet boxes -->
  <rect x="10" y="266" width="6" height="32" rx="0" fill="#ef5350"/>
  <rect x="294" y="266" width="6" height="32" rx="0" fill="#ef5350"/>

  <!-- ── TEAL stripe: Outlet→Fan (heat removal) ───────────────────────
       Connecting: outlet→fan, stripe inside fan -->

  <!-- Teal connectors: Outlet bottom → Fan top (y=298-312) -->
  <line x1="22"  y1="298" x2="22"  y2="312" stroke="#26a69a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="306" y1="298" x2="306" y2="312" stroke="#26a69a" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Teal stripe inside Fan boxes -->
  <rect x="10" y="312" width="6" height="28" rx="0" fill="#26a69a"/>
  <rect x="294" y="312" width="6" height="28" rx="0" fill="#26a69a"/>

  <!-- Flow direction arrows on connecting segments -->
  <polygon points="22,109 18,102 26,102" fill="#42a5f5"/>
  <polygon points="306,109 302,102 310,102" fill="#42a5f5"/>
  <polygon points="22,235 18,228 26,228" fill="#ef5350"/>
  <polygon points="306,235 302,228 310,228" fill="#ef5350"/>
  <polygon points="22,305 18,298 26,298" fill="#26a69a"/>
  <polygon points="306,305 302,298 310,298" fill="#26a69a"/>

  <!-- ── DIVIDER ──────────────────────────────────────────────────────── -->
  <line x1="0" y1="348" x2="560" y2="348" stroke="#b0bec5" stroke-width="1.5"/>

  <!-- ── BOTTOM INFO (y=348–358) — compact single row ────────────────── -->
  <text x="40"  y="356" text-anchor="middle" fill="#78909c" font-size="9">ΔT L1: <tspan fill="{DELTA_1_C}" font-weight="bold">{DELTA_1}</tspan><tspan fill="#90a4ae">°C</tspan></text>
  <text x="140" y="356" text-anchor="middle" fill="#78909c" font-size="9">ΔT L2: <tspan fill="{DELTA_2_C}" font-weight="bold">{DELTA_2}</tspan><tspan fill="#90a4ae">°C</tspan></text>
  <text x="230" y="356" text-anchor="middle" fill="#78909c" font-size="9">Leak: <tspan fill="{LEAK_C}" font-weight="bold">{LEAK}</tspan></text>
  <text x="360" y="356" text-anchor="middle" fill="#78909c" font-size="9">Ambient: <tspan fill="{AMBIENT_TEMP_C}" font-weight="bold">{AMBIENT_TEMP}</tspan><tspan fill="#90a4ae">°C</tspan> / <tspan fill="{AMBIENT_HUM_C}" font-weight="bold">{AMBIENT_HUM}</tspan><tspan fill="#90a4ae">%</tspan></text>
  <text x="504" y="356" text-anchor="middle" fill="#78909c" font-size="9">Pressure: <tspan fill="#455a64" font-weight="bold">{PRESSURE}</tspan><tspan fill="#90a4ae">bar</tspan></text>

</svg>
