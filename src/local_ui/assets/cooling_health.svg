<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 608" width="1280" height="608">

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1280" height="608" fill="#ffffff"/>

  <!--
    Layout (1280px canvas):
      Reservoir  x=5-145   w=140
      gap=77
      Pump       x=222-342 w=120
      gap=77
      Flow       x=419-529 w=110
      gap=77
      Inlet      x=606-736 w=130
      Server zone x=736-886 (w=150, vertical pipes only)
      Outlet     x=886-1016 w=130
      gap=79
      Fan+Rad    x=1095-1265 w=170
      Return pipe corner x=1272

    Lane 1 pipe y=167  (boxes y=120-215)
    Lane 2 pipe y=437  (boxes y=390-485)
    Server1 box y=15-90   pipe y=52
    Server2 box y=505-580 pipe y=542
  -->

  <!-- ═══ RETURN PIPES (behind everything) ═══ -->
  <polyline points="1265,167 1272,167 1272,10 8,10 8,167"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>
  <polyline points="1265,437 1272,437 1272,598 8,598 8,437"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>

  <!-- ═══ COLD PIPES — Lane 1 (blue) ═══ -->
  <line x1="145" y1="167" x2="222" y2="167" stroke="#4a90d9" stroke-width="4"/>
  <line x1="342" y1="167" x2="419" y2="167" stroke="#4a90d9" stroke-width="4"/>
  <line x1="529" y1="167" x2="606" y2="167" stroke="#4a90d9" stroke-width="4"/>
  <!-- Inlet1 → Server1 entry (up) -->
  <polyline points="736,167 741,167 741,52"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>
  <!-- Server1 left half (cold) -->
  <line x1="741" y1="52" x2="811" y2="52" stroke="#4a90d9" stroke-width="4"/>

  <!-- ═══ COLD PIPES — Lane 2 (blue) ═══ -->
  <line x1="145" y1="437" x2="222" y2="437" stroke="#4a90d9" stroke-width="4"/>
  <line x1="342" y1="437" x2="419" y2="437" stroke="#4a90d9" stroke-width="4"/>
  <line x1="529" y1="437" x2="606" y2="437" stroke="#4a90d9" stroke-width="4"/>
  <!-- Inlet2 → Server2 entry (down) -->
  <polyline points="736,437 741,437 741,542"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>
  <!-- Server2 left half (cold) -->
  <line x1="741" y1="542" x2="811" y2="542" stroke="#4a90d9" stroke-width="4"/>

  <!-- ═══ HOT PIPES — Server exit (red) ═══ -->
  <!-- Server1 right half + down to Outlet1 -->
  <line x1="811" y1="52" x2="881" y2="52" stroke="#d94a4a" stroke-width="4"/>
  <polyline points="881,52 881,167 886,167"
    fill="none" stroke="#d94a4a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Server2 right half + up to Outlet2 -->
  <line x1="811" y1="542" x2="881" y2="542" stroke="#d94a4a" stroke-width="4"/>
  <polyline points="881,542 881,437 886,437"
    fill="none" stroke="#d94a4a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Outlet → Fan+Rad (red) -->
  <line x1="1016" y1="167" x2="1095" y2="167" stroke="#d94a4a" stroke-width="4"/>
  <line x1="1016" y1="437" x2="1095" y2="437" stroke="#d94a4a" stroke-width="4"/>

  <!-- ═══ COMPONENT BOXES ═══ -->

  <!-- Reservoir (blue border, x=5-145, y=120-485) -->
  <rect x="5" y="120" width="140" height="365" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <line x1="5" y1="167" x2="145" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.5"/>
  <line x1="5" y1="437" x2="145" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.5"/>

  <!-- Pump L1 (gray, x=222-342, y=120-215) -->
  <rect x="222" y="120" width="120" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="222" y1="167" x2="342" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Pump L2 (gray, x=222-342, y=390-485) -->
  <rect x="222" y="390" width="120" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="222" y1="437" x2="342" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Flow L1 (gray, x=419-529, y=120-215) -->
  <rect x="419" y="120" width="110" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="419" y1="167" x2="529" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Flow L2 (gray, x=419-529, y=390-485) -->
  <rect x="419" y="390" width="110" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="419" y1="437" x2="529" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Inlet Manifold L1 (blue, x=606-736, y=120-215) -->
  <rect x="606" y="120" width="130" height="95" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <line x1="606" y1="167" x2="736" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Inlet Manifold L2 (blue, x=606-736, y=390-485) -->
  <rect x="606" y="390" width="130" height="95" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <line x1="606" y1="437" x2="736" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Server 1 (gray dashed, x=741-881, y=15-90) -->
  <rect x="741" y="15" width="140" height="75" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Server 2 (gray dashed, x=741-881, y=505-580) -->
  <rect x="741" y="505" width="140" height="75" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Outlet Manifold L1 (red, x=886-1016, y=120-215) -->
  <rect x="886" y="120" width="130" height="95" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>
  <line x1="886" y1="167" x2="1016" y2="167" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- Outlet Manifold L2 (red, x=886-1016, y=390-485) -->
  <rect x="886" y="390" width="130" height="95" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>
  <line x1="886" y1="437" x2="1016" y2="437" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- Fan+Radiator L1 (gray, x=1095-1265, y=120-215) -->
  <rect x="1095" y="120" width="170" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="1095" y1="167" x2="1265" y2="167" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- Fan+Radiator L2 (gray, x=1095-1265, y=390-485) -->
  <rect x="1095" y="390" width="170" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="1095" y1="437" x2="1265" y2="437" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- ═══ TEXT (min 14px — name:14 bold / value:22 / unit:14) ═══ -->

  <!-- ── Reservoir (cx=75) ── -->
  <text x="75" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Reservoir</text>
  <rect x="20" y="150" width="22" height="100" rx="3"
    fill="#f0f4f8" stroke="#4a90d9" stroke-width="1"/>
  <rect x="21" y="151" width="20" height="98" rx="2" fill="#4a90d9" opacity="0.2"/>
  <text x="75" y="188" text-anchor="middle"
    font-family="sans-serif" font-size="16" fill="{WATER_LEVEL_C}">{WATER_LEVEL}</text>
  <text x="75" y="282" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">pH</text>
  <text x="75" y="304" text-anchor="middle"
    font-family="sans-serif" font-size="16" fill="#000000">{PH}</text>
  <text x="75" y="355" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">Conductivity</text>
  <text x="75" y="377" text-anchor="middle"
    font-family="sans-serif" font-size="16" fill="#000000">{CONDUCTIVITY}</text>
  <text x="75" y="397" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">µS/cm</text>

  <!-- Loop labels (cx=183, between Reservoir and Pump) -->
  <text x="183" y="161" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">L1</text>
  <text x="183" y="431" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">L2</text>

  <!-- ── Pump L1 (cx=282) ── -->
  <text x="282" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Pump</text>
  <text x="334" y="137" text-anchor="end"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>
  <text x="282" y="172" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{PUMP_DUTY_1}</text>
  <text x="282" y="190" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">%</text>

  <!-- ── Pump L2 (cx=282) ── -->
  <text x="282" y="410" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Pump</text>
  <text x="334" y="407" text-anchor="end"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>
  <text x="282" y="442" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{PUMP_DUTY_2}</text>
  <text x="282" y="460" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">%</text>

  <!-- ── Flow L1 (cx=474) ── -->
  <text x="474" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Flow</text>
  <text x="474" y="165" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{FLOW_1}</text>
  <text x="474" y="184" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">L/min</text>

  <!-- ── Flow L2 (cx=474) ── -->
  <text x="474" y="410" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Flow</text>
  <text x="474" y="435" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{FLOW_2}</text>
  <text x="474" y="454" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">L/min</text>

  <!-- ── Inlet Manifold L1 (cx=671) ── -->
  <text x="671" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Inlet Manifold</text>
  <text x="671" y="165" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{INLET_1_C}">{INLET_1}</text>
  <text x="671" y="184" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">°C</text>

  <!-- ── Inlet Manifold L2 (cx=671) ── -->
  <text x="671" y="410" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Inlet Manifold</text>
  <text x="671" y="435" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{INLET_2_C}">{INLET_2}</text>
  <text x="671" y="454" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">°C</text>

  <!-- ── Server 1 (cx=811) ── -->
  <text x="811" y="57" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Server 1</text>

  <!-- ── Server 2 (cx=811) ── -->
  <text x="811" y="547" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Server 2</text>

  <!-- ── Outlet Manifold L1 (cx=951) ── -->
  <text x="951" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Outlet Manifold</text>
  <text x="951" y="165" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{OUTLET_1_C}">{OUTLET_1}</text>
  <text x="951" y="184" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">°C</text>

  <!-- ── Outlet Manifold L2 (cx=951) ── -->
  <text x="951" y="410" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Outlet Manifold</text>
  <text x="951" y="435" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{OUTLET_2_C}">{OUTLET_2}</text>
  <text x="951" y="454" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">°C</text>

  <!-- ── Fan+Radiator L1 (cx=1180) ── -->
  <text x="1180" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Fan + Radiator</text>
  <text x="1257" y="137" text-anchor="end"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>
  <text x="1180" y="172" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{FAN_DUTY_1}</text>
  <text x="1180" y="190" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">%</text>

  <!-- ── Fan+Radiator L2 (cx=1180) ── -->
  <text x="1180" y="410" text-anchor="middle"
    font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000">Fan + Radiator</text>
  <text x="1257" y="407" text-anchor="end"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>
  <text x="1180" y="442" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{FAN_DUTY_2}</text>
  <text x="1180" y="460" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#000000">%</text>

</svg>
