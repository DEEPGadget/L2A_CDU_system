<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 608" width="1280" height="608">

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1280" height="608" fill="#ffffff"/>

  <!-- ═══ ARROW MARKERS ═══ -->
  <defs>
    <marker id="arr-blue" markerWidth="12" markerHeight="9" refX="11" refY="4.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4.5 0,9" fill="#4a90d9"/>
    </marker>
    <marker id="arr-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4.5 0,9" fill="#d94a4a"/>
    </marker>
  </defs>

  <!--
    Flow path: Reservoir → Pump → Inlet Manifold → Server → Outlet Manifold
               → Flow meter → Fan+Radiator → return → Reservoir
    Flow meter sits on the hot return line, between Outlet and Fan+Radiator.
    Lane1 pipe_y=210 (boxes y=135-265), Lane2 pipe_y=390 (boxes y=315-465).
  -->

  <!-- ═══ RETURN PIPES (Fan → top/bottom → Reservoir) ═══ -->
  <polyline points="1175,60 1175,16 95,16 95,135"
    fill="none" stroke="#4a90d9" stroke-width="3" stroke-linejoin="round" opacity="0.7"/>
  <polyline points="1175,540 1175,580 95,580 95,445"
    fill="none" stroke="#4a90d9" stroke-width="3" stroke-linejoin="round" opacity="0.7"/>

  <!-- ═══ COLD PIPES — Lane 1 (y=210) ═══ -->
  <line x1="165" y1="210" x2="225" y2="210" stroke="#4a90d9" stroke-width="3"/>
  <line x1="345" y1="210" x2="395" y2="210" stroke="#4a90d9" stroke-width="3"/>
  <line x1="525" y1="210" x2="555" y2="210" stroke="#4a90d9" stroke-width="3"/>
  <line x1="555" y1="210" x2="555" y2="77"  stroke="#4a90d9" stroke-width="3"/>
  <line x1="555" y1="77"  x2="580" y2="77"  stroke="#4a90d9" stroke-width="3"/>

  <!-- ═══ COLD PIPES — Lane 2 (y=390) ═══ -->
  <line x1="165" y1="390" x2="225" y2="390" stroke="#4a90d9" stroke-width="3"/>
  <line x1="345" y1="390" x2="395" y2="390" stroke="#4a90d9" stroke-width="3"/>
  <line x1="525" y1="390" x2="555" y2="390" stroke="#4a90d9" stroke-width="3"/>
  <line x1="555" y1="390" x2="555" y2="522" stroke="#4a90d9" stroke-width="3"/>
  <line x1="555" y1="522" x2="580" y2="522" stroke="#4a90d9" stroke-width="3"/>

  <!-- ═══ HOT PIPES — Lane 1 (Server → Outlet → Flow → Fan) ═══ -->
  <line x1="700" y1="77"  x2="725" y2="77"  stroke="#d94a4a" stroke-width="3"/>
  <line x1="725" y1="77"  x2="725" y2="210" stroke="#d94a4a" stroke-width="3"/>
  <line x1="725" y1="210" x2="755" y2="210" stroke="#d94a4a" stroke-width="3"/>
  <line x1="885" y1="210" x2="930" y2="210" stroke="#d94a4a" stroke-width="3"/>
  <line x1="1020" y1="210" x2="1095" y2="210" stroke="#d94a4a" stroke-width="3"/>

  <!-- ═══ HOT PIPES — Lane 2 ═══ -->
  <line x1="700" y1="522" x2="725" y2="522" stroke="#d94a4a" stroke-width="3"/>
  <line x1="725" y1="522" x2="725" y2="390" stroke="#d94a4a" stroke-width="3"/>
  <line x1="725" y1="390" x2="755" y2="390" stroke="#d94a4a" stroke-width="3"/>
  <line x1="885" y1="390" x2="930" y2="390" stroke="#d94a4a" stroke-width="3"/>
  <line x1="1020" y1="390" x2="1095" y2="390" stroke="#d94a4a" stroke-width="3"/>

  <!-- ═══ COMPONENT BOXES ═══ -->

  <!-- Reservoir (blue, x=25-165, y=135-465) -->
  <rect x="25" y="135" width="140" height="330" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>

  <!-- Pump L1/L2 (gray, h=150) -->
  <rect x="225" y="135" width="120" height="150" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="225" y="315" width="120" height="150" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>

  <!-- Inlet Manifold L1/L2 (blue, x=395-525) -->
  <rect x="395" y="135" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="395" y="315" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>

  <!-- Outlet Manifold L1/L2 (red, x=755-885) -->
  <rect x="755" y="135" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>
  <rect x="755" y="315" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>

  <!-- Flow L1/L2 — 센서, 테두리 없음 (x=930-1020, between Outlet and Fan) -->
  <rect x="930" y="135" width="90" height="150" rx="6"
    fill="#ffffff" stroke="none"/>
  <rect x="930" y="315" width="90" height="150" rx="6"
    fill="#ffffff" stroke="none"/>

  <!-- Fan+Radiator L1/L2 (gray, x=1095-1255, h=220) -->
  <rect x="1095" y="60" width="160" height="220" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="1095" y="320" width="160" height="220" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>

  <!-- Server boxes (x=580-700) -->
  <rect x="580" y="50" width="120" height="55" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,3"/>
  <rect x="580" y="495" width="120" height="55" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,3"/>

  <!-- ═══ FLOW ARROWS ═══ -->

  <!-- Cold supply — Lane 1 -->
  <line x1="182" y1="210" x2="198" y2="210" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="360" y1="210" x2="376" y2="210" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="555" y1="150" x2="555" y2="134" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="560" y1="77"  x2="576" y2="77"  stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- Cold supply — Lane 2 -->
  <line x1="182" y1="390" x2="198" y2="390" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="360" y1="390" x2="376" y2="390" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="555" y1="450" x2="555" y2="466" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="560" y1="522" x2="576" y2="522" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- Hot return — Lane 1 (Server → Outlet → Flow → Fan) -->
  <line x1="705" y1="77"  x2="721" y2="77"  stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="725" y1="150" x2="725" y2="166" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="730" y1="210" x2="746" y2="210" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="895" y1="210" x2="911" y2="210" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="1050" y1="210" x2="1066" y2="210" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>

  <!-- Hot return — Lane 2 -->
  <line x1="705" y1="522" x2="721" y2="522" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="725" y1="450" x2="725" y2="434" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="730" y1="390" x2="746" y2="390" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="895" y1="390" x2="911" y2="390" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="1050" y1="390" x2="1066" y2="390" stroke="#d94a4a" stroke-width="1" marker-end="url(#arr-red)"/>

  <!-- Return pipe arrows -->
  <line x1="1175" y1="48"  x2="1175" y2="32"  stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="648"  y1="16"  x2="632"  y2="16"  stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="95"   y1="62"  x2="95"   y2="78"  stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="1175" y1="552" x2="1175" y2="568" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="648"  y1="580" x2="632"  y2="580" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="95"   y1="524" x2="95"   y2="508" stroke="#4a90d9" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- ═══ TEXT ═══ -->

  <!-- ── Reservoir (cx=95) ── -->
  <text x="95" y="170" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Reservoir</text>
  <text x="95" y="212" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#000000">Level</text>
  <text x="95" y="242" text-anchor="middle" font-family="sans-serif" font-size="24" fill="{WATER_LEVEL_C}">{WATER_LEVEL}</text>
  <text x="95" y="286" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#000000">pH</text>
  <text x="95" y="316" text-anchor="middle" font-family="sans-serif" font-size="24" fill="{PH_C}">{PH}</text>
  <text x="95" y="364" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#000000">Conductivity</text>
  <text x="95" y="394" text-anchor="middle" font-family="sans-serif" font-size="24" fill="{CONDUCTIVITY_C}">{CONDUCTIVITY}</text>
  <text x="95" y="420" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#000000">µS/cm</text>

  <!-- Loop labels -->
  <text x="195" y="196" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000">L1</text>
  <text x="195" y="376" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000">L2</text>

  <!-- ── Pump L1 (cx=285) — duty 를 매니폴드 값선(240)에 정렬 ── -->
  <text x="285" y="166" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Pump</text>
  <text x="285" y="238" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#000000">{PUMP_DUTY_1}<tspan dx="8" font-size="18">%</tspan></text>
  <text x="285" y="264" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#2980b9">{GEAR}</text>
  <!-- ── Pump L2 ── -->
  <text x="285" y="346" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Pump</text>
  <text x="285" y="418" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#000000">{PUMP_DUTY_2}<tspan dx="8" font-size="18">%</tspan></text>
  <text x="285" y="444" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#2980b9">{GEAR}</text>

  <!-- ── Inlet Manifold L1 (cx=460) ── -->
  <text x="460" y="167" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Inlet</text>
  <text x="460" y="189" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Manifold</text>
  <text x="460" y="240" text-anchor="middle" font-family="sans-serif" font-size="32" fill="{INLET_1_C}">{INLET_1}<tspan dx="8" font-size="18">°C</tspan></text>
  <!-- ── Inlet Manifold L2 ── -->
  <text x="460" y="347" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Inlet</text>
  <text x="460" y="369" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Manifold</text>
  <text x="460" y="420" text-anchor="middle" font-family="sans-serif" font-size="32" fill="{INLET_2_C}">{INLET_2}<tspan dx="8" font-size="18">°C</tspan></text>

  <!-- ── Server 1 (cx=640) ── -->
  <text x="640" y="82" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Server 1</text>
  <!-- ── Server 2 ── -->
  <text x="640" y="528" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Server 2</text>

  <!-- ── Outlet Manifold L1 (cx=820) ── -->
  <text x="820" y="167" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Outlet</text>
  <text x="820" y="189" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Manifold</text>
  <text x="820" y="240" text-anchor="middle" font-family="sans-serif" font-size="32" fill="{OUTLET_1_C}">{OUTLET_1}<tspan dx="8" font-size="18">°C</tspan></text>
  <!-- ── Outlet Manifold L2 ── -->
  <text x="820" y="347" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Outlet</text>
  <text x="820" y="369" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Manifold</text>
  <text x="820" y="420" text-anchor="middle" font-family="sans-serif" font-size="32" fill="{OUTLET_2_C}">{OUTLET_2}<tspan dx="8" font-size="18">°C</tspan></text>

  <!-- ── Flow L1 (cx=975, 테두리 없는 센서) — 총합 + 분기 1/2 (개행) ── -->
  <text x="975" y="150" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Flow</text>
  <text x="975" y="187" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#000000">{FLOW_1}</text>
  <text x="975" y="209" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#000000">L/min</text>
  <text x="975" y="234" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555555">1 : {FLOW_1_1}</text>
  <text x="975" y="255" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555555">2 : {FLOW_1_2}</text>
  <!-- ── Flow L2 ── -->
  <text x="975" y="330" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Flow</text>
  <text x="975" y="367" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#000000">{FLOW_2}</text>
  <text x="975" y="389" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#000000">L/min</text>
  <text x="975" y="414" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555555">1 : {FLOW_2_1}</text>
  <text x="975" y="435" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555555">2 : {FLOW_2_2}</text>

  <!-- ── Fan+Radiator L1 (cx=1175) — 수치 하향: duty 를 매니폴드 값선(240)에 정렬 ── -->
  <text x="1175" y="120" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Fan +</text>
  <text x="1175" y="145" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Radiator</text>
  <text x="1175" y="198" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#000000">{FAN_RPM_1}<tspan dx="6" font-size="18"> RPM</tspan></text>
  <text x="1175" y="240" text-anchor="middle" font-family="sans-serif" font-size="38" fill="#000000">{FAN_DUTY_1}<tspan dx="6" font-size="20"> %</tspan></text>
  <text x="1175" y="274" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#2980b9">{GEAR}</text>
  <!-- ── Fan+Radiator L2 (duty 를 매니폴드 값선(420)에 정렬) ── -->
  <text x="1175" y="335" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Fan +</text>
  <text x="1175" y="360" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000">Radiator</text>
  <text x="1175" y="388" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#000000">{FAN_RPM_2}<tspan dx="6" font-size="18"> RPM</tspan></text>
  <text x="1175" y="420" text-anchor="middle" font-family="sans-serif" font-size="38" fill="#000000">{FAN_DUTY_2}<tspan dx="6" font-size="20"> %</tspan></text>
  <text x="1175" y="454" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#2980b9">{GEAR}</text>

</svg>
