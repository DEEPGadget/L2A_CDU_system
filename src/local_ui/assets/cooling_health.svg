<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 608" width="1280" height="608">

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1280" height="608" fill="#ffffff"/>

  <!--
    Vertical (boxes h=150):
      Return top:  y=16
      Server1:     y=30-85    pipe_y=57
      [visible: 30px]
      Lane 1:      y=115-265  pipe_y=190
      Lane gap:    30px
      Lane 2:      y=295-445  pipe_y=370
      [visible: 30px]
      Server2:     y=475-530  pipe_y=502
      Return bot:  y=580
      Reservoir:   y=115-445  h=330
  -->

  <!-- ═══ RETURN PIPES ═══ -->
  <polyline points="1175,115 1175,16 95,16 95,115"
    fill="none" stroke="#4a90d9" stroke-width="3" stroke-linejoin="round" opacity="0.7"/>
  <polyline points="1175,445 1175,580 95,580 95,445"
    fill="none" stroke="#4a90d9" stroke-width="3" stroke-linejoin="round" opacity="0.7"/>

  <!-- ═══ COLD PIPES — Lane 1 (pipe_y=190) ═══ -->
  <line x1="165" y1="190" x2="225" y2="190" stroke="#4a90d9" stroke-width="4"/>
  <line x1="345" y1="190" x2="405" y2="190" stroke="#4a90d9" stroke-width="4"/>
  <line x1="485" y1="190" x2="545" y2="190" stroke="#4a90d9" stroke-width="4"/>
  <line x1="675" y1="190" x2="705" y2="190" stroke="#4a90d9" stroke-width="4"/>
  <line x1="705" y1="190" x2="705" y2="57"  stroke="#4a90d9" stroke-width="4"/>
  <line x1="705" y1="57"  x2="730" y2="57"  stroke="#4a90d9" stroke-width="4"/>

  <!-- ═══ COLD PIPES — Lane 2 (pipe_y=370) ═══ -->
  <line x1="165" y1="370" x2="225" y2="370" stroke="#4a90d9" stroke-width="4"/>
  <line x1="345" y1="370" x2="405" y2="370" stroke="#4a90d9" stroke-width="4"/>
  <line x1="485" y1="370" x2="545" y2="370" stroke="#4a90d9" stroke-width="4"/>
  <line x1="675" y1="370" x2="705" y2="370" stroke="#4a90d9" stroke-width="4"/>
  <line x1="705" y1="370" x2="705" y2="502" stroke="#4a90d9" stroke-width="4"/>
  <line x1="705" y1="502" x2="730" y2="502" stroke="#4a90d9" stroke-width="4"/>

  <!-- ═══ HOT PIPES ═══ -->
  <line x1="850" y1="57"  x2="875" y2="57"  stroke="#d94a4a" stroke-width="4"/>
  <line x1="875" y1="57"  x2="875" y2="190" stroke="#d94a4a" stroke-width="4"/>
  <line x1="875" y1="190" x2="905" y2="190" stroke="#d94a4a" stroke-width="4"/>
  <line x1="850" y1="502" x2="875" y2="502" stroke="#d94a4a" stroke-width="4"/>
  <line x1="875" y1="502" x2="875" y2="370" stroke="#d94a4a" stroke-width="4"/>
  <line x1="875" y1="370" x2="905" y2="370" stroke="#d94a4a" stroke-width="4"/>
  <line x1="1035" y1="190" x2="1095" y2="190" stroke="#d94a4a" stroke-width="4"/>
  <line x1="1035" y1="370" x2="1095" y2="370" stroke="#d94a4a" stroke-width="4"/>

  <!-- ═══ COMPONENT BOXES ═══ -->

  <!-- Reservoir (blue, x=25-165, y=115-445, h=330) -->
  <rect x="25" y="115" width="140" height="330" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>

  <!-- Pump L1/L2 (gray, h=150) -->
  <rect x="225" y="115" width="120" height="150" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="225" y="295" width="120" height="150" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>

  <!-- Flow L1/L2 — 센서, 테두리 없음 -->
  <rect x="405" y="115" width="80" height="150" rx="6"
    fill="#ffffff" stroke="none"/>
  <rect x="405" y="295" width="80" height="150" rx="6"
    fill="#ffffff" stroke="none"/>

  <!-- Inlet Manifold L1/L2 (blue, h=150) -->
  <rect x="545" y="115" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="545" y="295" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>

  <!-- Outlet Manifold L1/L2 (red, h=150) -->
  <rect x="905" y="115" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>
  <rect x="905" y="295" width="130" height="150" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>

  <!-- Fan+Radiator L1/L2 (gray, h=150) -->
  <rect x="1095" y="115" width="160" height="150" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="1095" y="295" width="160" height="150" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>

  <!-- Server horizontal connectors -->
  <line x1="705" y1="57"  x2="730" y2="57"  stroke="#4a90d9" stroke-width="4"/>
  <line x1="850" y1="57"  x2="875" y2="57"  stroke="#d94a4a" stroke-width="4"/>
  <line x1="705" y1="502" x2="730" y2="502" stroke="#4a90d9" stroke-width="4"/>
  <line x1="850" y1="502" x2="875" y2="502" stroke="#d94a4a" stroke-width="4"/>

  <!-- Server boxes -->
  <rect x="730" y="30" width="120" height="55" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="730" y="475" width="120" height="55" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Server internal pipes ON TOP -->
  <line x1="730" y1="57"  x2="790" y2="57"  stroke="#4a90d9" stroke-width="4"/>
  <line x1="790" y1="57"  x2="850" y2="57"  stroke="#d94a4a" stroke-width="4"/>
  <line x1="730" y1="502" x2="790" y2="502" stroke="#4a90d9" stroke-width="4"/>
  <line x1="790" y1="502" x2="850" y2="502" stroke="#d94a4a" stroke-width="4"/>

  <!-- ═══ TEXT ═══ -->

  <!-- ── Reservoir (cx=95, y=115-445) ── -->
  <text x="95" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Reservoir</text>
  <text x="95" y="172" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">Level</text>
  <text x="95" y="202" text-anchor="middle"
    font-family="sans-serif" font-size="24" fill="{WATER_LEVEL_C}">{WATER_LEVEL}</text>
  <text x="95" y="256" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">pH</text>
  <text x="95" y="286" text-anchor="middle"
    font-family="sans-serif" font-size="24" fill="#000000">{PH}</text>
  <text x="95" y="344" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">Conductivity</text>
  <text x="95" y="374" text-anchor="middle"
    font-family="sans-serif" font-size="24" fill="#000000">{CONDUCTIVITY}</text>
  <text x="95" y="400" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">µS/cm</text>

  <!-- Loop labels -->
  <text x="195" y="176" text-anchor="middle"
    font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000">L1</text>
  <text x="195" y="356" text-anchor="middle"
    font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000">L2</text>

  <!-- ── Pump L1 (cx=285, box y=115-265, pipe_y=190) ── -->
  <text x="285" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Pump</text>
  <text x="252" y="200" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="#000000">{PUMP_DUTY_1}</text>
  <text x="252" y="226" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">%</text>
  <text x="296" y="208" text-anchor="start"
    font-family="sans-serif" font-size="38" fill="#2980b9">⚙</text>

  <!-- ── Pump L2 (box y=295-445) ── -->
  <text x="285" y="320" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Pump</text>
  <text x="252" y="380" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="#000000">{PUMP_DUTY_2}</text>
  <text x="252" y="406" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">%</text>
  <text x="296" y="388" text-anchor="start"
    font-family="sans-serif" font-size="38" fill="#2980b9">⚙</text>

  <!-- ── Flow L1 (cx=445, 테두리 없는 센서) ── -->
  <text x="445" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Flow</text>
  <text x="445" y="198" text-anchor="middle"
    font-family="sans-serif" font-size="30" fill="#000000">{FLOW_1}</text>
  <text x="445" y="224" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">L/min</text>

  <!-- ── Flow L2 ── -->
  <text x="445" y="320" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Flow</text>
  <text x="445" y="378" text-anchor="middle"
    font-family="sans-serif" font-size="30" fill="#000000">{FLOW_2}</text>
  <text x="445" y="404" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">L/min</text>

  <!-- ── Inlet Manifold L1 (cx=610) ── -->
  <text x="610" y="138" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Inlet</text>
  <text x="610" y="160" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Manifold</text>
  <text x="610" y="200" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="{INLET_1_C}">{INLET_1}</text>
  <text x="610" y="226" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">°C</text>

  <!-- ── Inlet Manifold L2 ── -->
  <text x="610" y="318" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Inlet</text>
  <text x="610" y="340" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Manifold</text>
  <text x="610" y="380" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="{INLET_2_C}">{INLET_2}</text>
  <text x="610" y="406" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">°C</text>

  <!-- ── Server 1 (cx=790, box y=30-85) ── -->
  <text x="790" y="48" text-anchor="middle"
    font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000">Server 1</text>

  <!-- ── Server 2 (box y=475-530) ── -->
  <text x="790" y="493" text-anchor="middle"
    font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000">Server 2</text>

  <!-- ── Outlet Manifold L1 (cx=970) ── -->
  <text x="970" y="138" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Outlet</text>
  <text x="970" y="160" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Manifold</text>
  <text x="970" y="200" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="{OUTLET_1_C}">{OUTLET_1}</text>
  <text x="970" y="226" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">°C</text>

  <!-- ── Outlet Manifold L2 ── -->
  <text x="970" y="318" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Outlet</text>
  <text x="970" y="340" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Manifold</text>
  <text x="970" y="380" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="{OUTLET_2_C}">{OUTLET_2}</text>
  <text x="970" y="406" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">°C</text>

  <!-- ── Fan+Radiator L1 (cx=1175, box y=115-265) ── -->
  <text x="1175" y="140" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Fan + Radiator</text>
  <text x="1136" y="200" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="#000000">{FAN_DUTY_1}</text>
  <text x="1136" y="226" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">%</text>
  <text x="1184" y="208" text-anchor="start"
    font-family="sans-serif" font-size="38" fill="#2980b9">⚙</text>

  <!-- ── Fan+Radiator L2 (box y=295-445) ── -->
  <text x="1175" y="320" text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000">Fan + Radiator</text>
  <text x="1136" y="380" text-anchor="middle"
    font-family="sans-serif" font-size="32" fill="#000000">{FAN_DUTY_2}</text>
  <text x="1136" y="406" text-anchor="middle"
    font-family="sans-serif" font-size="18" fill="#000000">%</text>
  <text x="1184" y="388" text-anchor="start"
    font-family="sans-serif" font-size="38" fill="#2980b9">⚙</text>

</svg>
