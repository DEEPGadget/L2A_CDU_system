<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 608" width="1280" height="608">

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1280" height="608" fill="#ffffff"/>

  <!-- ═══ RETURN PIPES (behind everything) ═══ -->
  <!-- Lane 1 return: Fan+Rad1 right → right edge → top → Reservoir left -->
  <polyline
    points="1090,167 1272,167 1272,10 8,10 8,167"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>
  <!-- Lane 2 return: Fan+Rad2 right → right edge → bottom → Reservoir left -->
  <polyline
    points="1090,437 1272,437 1272,598 8,598 8,437"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>

  <!-- ═══ SUPPLY PIPES — cold (blue) ═══ -->
  <!-- Lane 1: Reservoir → Pump1 → Flow1 → Inlet1 -->
  <line x1="125" y1="167" x2="155" y2="167" stroke="#4a90d9" stroke-width="4"/>
  <line x1="285" y1="167" x2="315" y2="167" stroke="#4a90d9" stroke-width="4"/>
  <line x1="430" y1="167" x2="460" y2="167" stroke="#4a90d9" stroke-width="4"/>
  <!-- Lane 1: Inlet1 right → up to Server1 entry (cold) -->
  <polyline points="595,167 600,167 600,52"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>
  <!-- Server1 left half (cold, blue) -->
  <line x1="600" y1="52" x2="672" y2="52" stroke="#4a90d9" stroke-width="4"/>

  <!-- Lane 2: Reservoir → Pump2 → Flow2 → Inlet2 -->
  <line x1="125" y1="437" x2="155" y2="437" stroke="#4a90d9" stroke-width="4"/>
  <line x1="285" y1="437" x2="315" y2="437" stroke="#4a90d9" stroke-width="4"/>
  <line x1="430" y1="437" x2="460" y2="437" stroke="#4a90d9" stroke-width="4"/>
  <!-- Lane 2: Inlet2 right → down to Server2 entry (cold) -->
  <polyline points="595,437 600,437 600,542"
    fill="none" stroke="#4a90d9" stroke-width="4" stroke-linejoin="round"/>
  <!-- Server2 left half (cold, blue) -->
  <line x1="600" y1="542" x2="672" y2="542" stroke="#4a90d9" stroke-width="4"/>

  <!-- ═══ SERVER EXIT — hot (red) ═══ -->
  <!-- Server1 right half + down to Outlet1 -->
  <line x1="672" y1="52" x2="745" y2="52" stroke="#d94a4a" stroke-width="4"/>
  <polyline points="745,52 745,167"
    fill="none" stroke="#d94a4a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Server2 right half + up to Outlet2 -->
  <line x1="672" y1="542" x2="745" y2="542" stroke="#d94a4a" stroke-width="4"/>
  <polyline points="745,542 745,437"
    fill="none" stroke="#d94a4a" stroke-width="4" stroke-linejoin="round"/>

  <!-- ═══ HOT PIPES — Outlet → Fan+Rad (red) ═══ -->
  <line x1="880" y1="167" x2="910" y2="167" stroke="#d94a4a" stroke-width="4"/>
  <line x1="880" y1="437" x2="910" y2="437" stroke="#d94a4a" stroke-width="4"/>

  <!-- ═══ HEADER STRIP (y=90–120, component names) ═══ -->
  <rect x="125" y="90" width="965" height="30" rx="0" fill="#f5f5f5"/>
  <text x="220" y="111" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Pump</text>
  <text x="372" y="111" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Flow</text>
  <text x="527" y="111" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Inlet Manifold</text>
  <text x="812" y="111" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Outlet Manifold</text>
  <text x="1000" y="111" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Fan + Radiator</text>

  <!-- ═══ COMPONENT BOXES ═══ -->

  <!-- Reservoir (blue border, spans both lanes y=120-485) -->
  <rect x="5" y="120" width="120" height="365" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <!-- Pipe through Reservoir -->
  <line x1="5" y1="167" x2="125" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.5"/>
  <line x1="5" y1="437" x2="125" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.5"/>

  <!-- Pump Loop1 (gray border) -->
  <rect x="155" y="120" width="130" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="155" y1="167" x2="285" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Pump Loop2 (gray border) -->
  <rect x="155" y="390" width="130" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="155" y1="437" x2="285" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Flow Loop1 (gray border) -->
  <rect x="315" y="120" width="115" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="315" y1="167" x2="430" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Flow Loop2 (gray border) -->
  <rect x="315" y="390" width="115" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="315" y1="437" x2="430" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Inlet Manifold L1 (blue border) -->
  <rect x="460" y="120" width="135" height="95" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <line x1="460" y1="167" x2="595" y2="167" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Inlet Manifold L2 (blue border) -->
  <rect x="460" y="390" width="135" height="95" rx="6"
    fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <line x1="460" y1="437" x2="595" y2="437" stroke="#4a90d9" stroke-width="4" opacity="0.4"/>

  <!-- Server 1 (gray dashed, CDU 외부, above Lane 1) -->
  <rect x="600" y="15" width="145" height="75" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Server 2 (gray dashed, CDU 외부, below Lane 2) -->
  <rect x="600" y="505" width="145" height="75" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Outlet Manifold L1 (red border) -->
  <rect x="745" y="120" width="135" height="95" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>
  <line x1="745" y1="167" x2="880" y2="167" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- Outlet Manifold L2 (red border) -->
  <rect x="745" y="390" width="135" height="95" rx="6"
    fill="#ffffff" stroke="#d94a4a" stroke-width="2"/>
  <line x1="745" y1="437" x2="880" y2="437" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- Fan + Radiator L1 (gray border) -->
  <rect x="910" y="120" width="180" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="910" y1="167" x2="1090" y2="167" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- Fan + Radiator L2 (gray border) -->
  <rect x="910" y="390" width="180" height="95" rx="6"
    fill="#ffffff" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="910" y1="437" x2="1090" y2="437" stroke="#d94a4a" stroke-width="4" opacity="0.4"/>

  <!-- ═══ TEXT — VALUES ONLY inside boxes ═══ -->

  <!-- Reservoir (내부에 이름 표시 — 공유 컴포넌트 예외) -->
  <text x="65" y="143" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Reservoir</text>
  <!-- Level bar outline -->
  <rect x="18" y="153" width="22" height="110" rx="3"
    fill="#f0f4f8" stroke="#4a90d9" stroke-width="1"/>
  <rect x="19" y="154" width="20" height="108" rx="2" fill="#4a90d9" opacity="0.2"/>
  <!-- Level status -->
  <text x="65" y="190" text-anchor="middle"
    font-family="sans-serif" font-size="16" fill="{WATER_LEVEL_C}">{WATER_LEVEL}</text>
  <!-- pH -->
  <text x="65" y="290" text-anchor="middle"
    font-family="sans-serif" font-size="11" fill="#000000">pH</text>
  <text x="65" y="310" text-anchor="middle"
    font-family="sans-serif" font-size="16" fill="#000000">{PH}</text>
  <!-- Conductivity -->
  <text x="65" y="360" text-anchor="middle"
    font-family="sans-serif" font-size="11" fill="#000000">Conductivity</text>
  <text x="65" y="380" text-anchor="middle"
    font-family="sans-serif" font-size="15" fill="#000000">{CONDUCTIVITY}</text>
  <text x="65" y="396" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">µS/cm</text>

  <!-- Loop labels (black, between Reservoir right and Pump left) -->
  <text x="140" y="162" text-anchor="middle"
    font-family="sans-serif" font-size="11" font-weight="bold" fill="#000000">L1</text>
  <text x="140" y="432" text-anchor="middle"
    font-family="sans-serif" font-size="11" font-weight="bold" fill="#000000">L2</text>

  <!-- Pump Loop1 — value only -->
  <text x="220" y="172" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{PUMP_DUTY_1}%</text>
  <text x="276" y="135" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>

  <!-- Pump Loop2 — value only -->
  <text x="220" y="442" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{PUMP_DUTY_2}%</text>
  <text x="276" y="405" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>

  <!-- Flow Loop1 — value only -->
  <text x="372" y="165" text-anchor="middle"
    font-family="sans-serif" font-size="20" fill="#000000">{FLOW_1}</text>
  <text x="372" y="183" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">L/min</text>

  <!-- Flow Loop2 — value only -->
  <text x="372" y="435" text-anchor="middle"
    font-family="sans-serif" font-size="20" fill="#000000">{FLOW_2}</text>
  <text x="372" y="453" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">L/min</text>

  <!-- Inlet Manifold L1 — value only -->
  <text x="527" y="165" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{INLET_1_C}">{INLET_1}</text>
  <text x="527" y="183" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">°C</text>

  <!-- Inlet Manifold L2 — value only -->
  <text x="527" y="435" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{INLET_2_C}">{INLET_2}</text>
  <text x="527" y="453" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">°C</text>

  <!-- Server 1 (이름 박스 내부 표시 — 외부 컴포넌트 예외) -->
  <text x="672" y="57" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Server 1</text>

  <!-- Server 2 (이름 박스 내부 표시) -->
  <text x="672" y="547" text-anchor="middle"
    font-family="sans-serif" font-size="13" font-weight="bold" fill="#000000">Server 2</text>

  <!-- Outlet Manifold L1 — value only -->
  <text x="812" y="165" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{OUTLET_1_C}">{OUTLET_1}</text>
  <text x="812" y="183" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">°C</text>

  <!-- Outlet Manifold L2 — value only -->
  <text x="812" y="435" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="{OUTLET_2_C}">{OUTLET_2}</text>
  <text x="812" y="453" text-anchor="middle"
    font-family="sans-serif" font-size="10" fill="#000000">°C</text>

  <!-- Fan + Radiator L1 — value only -->
  <text x="1000" y="172" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{FAN_DUTY_1}%</text>
  <text x="1072" y="135" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>

  <!-- Fan + Radiator L2 — value only -->
  <text x="1000" y="442" text-anchor="middle"
    font-family="sans-serif" font-size="22" fill="#000000">{FAN_DUTY_2}%</text>
  <text x="1072" y="405" text-anchor="middle"
    font-family="sans-serif" font-size="14" fill="#555555">✎</text>

</svg>
